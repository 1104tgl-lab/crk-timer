<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRK PRO LIVE v13.5</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0F172A; --text-main: #FFFFFF; --text-sub: #94A3B8;     
            --c-cyan: #00E6F6; --c-purple: #9D4EDD; --c-pink: #EC4899;       
            --c-rose: #F43F5E; --c-sky: #0EA5E9; --c-orange: #F59E0B;     
            --c-green: #10B981; --c-mint: #2DD4BF; --bg-btn: rgba(15, 23, 42, 0.95);
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .sidebar-wrapper { width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .sidebar { width: 100%; height: 100%; display: flex; flex-direction: row; padding: 0 15px; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 900; color: var(--c-cyan); }
        .nav-btn { background: transparent; border: none; color: var(--text-sub); padding: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; }
        .nav-btn.active { color: var(--text-main); background: rgba(255,255,255,0.1); }

        .main-content { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; width: 100%; max-width: 1400px; margin: 0 auto; }
        .view-section.active { display: block; }

        .row { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; width: 100%; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .card-header { font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .item-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); }
        .item { background: rgba(15, 23, 42, 0.8); border-radius: 12px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .item-click-area { padding: 15px 5px; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-btn-area { background: var(--bg-btn); padding: 8px; display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 12px; font-weight: bold; }
        .item-title { font-size: 10px; color: var(--text-sub); font-weight: bold; margin-bottom: 4px; text-align: center; }
        .item-val { font-size: 17px; font-weight: 900; text-align: center; }

        .text-cyan { color: var(--c-cyan); } .text-purple { color: var(--c-purple); } .text-pink { color: var(--c-pink); }
        .text-rose { color: var(--c-rose); } .text-sky { color: var(--c-sky); } .text-orange { color: var(--c-orange); }
        .text-mint { color: var(--c-mint); } .text-white { color: #FFF; } .text-gray { color: #64748B; }

        .input-box-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; min-width: 80px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; }
        .action-btn { background: var(--c-purple); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

        @media (min-width: 981px) {
            body { flex-direction: row; }
            .sidebar-wrapper { width: 75px; height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); }
            .sidebar { flex-direction: column; padding: 30px 10px; }
            .row { flex-direction: row; } .card { flex: 1; }
            .card-stam { flex: 1.2; } .card-track { flex: 1.8; } .card-train { flex: 2.5; }
        }
    </style>
</head>
<body>
    <input type="file" id="bgInput" accept="image/*" style="display: none;">
    <div class="sidebar-wrapper">
        <div class="sidebar">
            <div class="logo">💎 LIVE</div>
            <div style="display:flex; flex-direction:inherit; gap:10px;">
                <button class="nav-btn active" onclick="switchView('dashboard', this)">📊</button>
                <button class="nav-btn" onclick="switchView('settings', this)">⚙️</button>
            </div>
            <button class="nav-btn" onclick="document.getElementById('bgInput').click()">🖼️</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="view-section active">
            <div class="row">
                <div class="card card-stam"><div class="card-header">에너지 관리</div><div class="item-grid" id="grid-stam"></div></div>
                <div class="card card-track"><div class="card-header">시스템 트래킹</div><div class="item-grid" id="grid-track"></div></div>
            </div>
            <div class="row">
                <div class="card"><div class="card-header">광산 탐사</div><div class="item-grid" id="grid-exp"></div></div>
                <div class="card card-train"><div class="card-header">물류 열차</div><div class="item-grid" id="grid-train"></div></div>
                <div class="card"><div class="card-header">열기구</div><div class="item-grid" id="grid-bal"></div></div>
            </div>
            <div class="row"><div class="card"><div class="card-header">광맥 채굴</div><div class="item-grid" id="grid-mine"></div></div></div>
            <div class="row" id="row-tasks" style="display:none;"><div class="card"><div class="card-header">생산 / 업그레이드</div><div class="item-grid" id="grid-tasks"></div></div></div>
        </div>

        <div id="settings" class="view-section">
            <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content: center;">
                <div class="card" style="width:100%; max-width:500px;">
                    <div class="card-header">⚙️ 프로젝트 등록</div>
                    <div class="input-group" style="margin-bottom:15px;"><label>작업명</label><input type="text" id="mName"></div>
                    <div class="input-box-grid">
                        <div class="input-group"><label>일</label><input type="number" id="mD" value="0"></div>
                        <div class="input-group"><label>시</label><input type="number" id="mH" value="0"></div>
                        <div class="input-group"><label>분</label><input type="number" id="mM" value="0"></div>
                    </div>
                    <button class="action-btn" onclick="addTask()">등록하기</button>
                </div>
                <div class="card" style="width:100%; max-width:500px; border-color:var(--c-green);">
                    <div class="card-header">🔄 데이터 복구 (이전버전에서 가져오기)</div>
                    <textarea id="legacyCode" style="width:100%; height:80px; background:rgba(0,0,0,0.3); color:white; padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.1); font-size:10px; resize:none;"></textarea>
                    <button class="action-btn" style="background:var(--c-green); color:#000; margin-top:10px;" onclick="recoverLegacyData()">클라우드로 데이터 덮어쓰기</button>
                </div>
            </div>
        </div>
    </div>

    <dialog id="setupModal"><h3 id="setupTitle" style="margin-bottom:15px;">설정</h3><div id="setupBody"></div><div style="margin-top:15px; display:flex; gap:10px;"><button class="action-btn" style="background:var(--c-cyan); color:#000; flex:2" onclick="applySetup()">확인</button><button id="btnReset" class="action-btn" style="background:var(--c-rose); flex:1" onclick="resetSetup()">리셋</button></div><button class="action-btn" style="background:#334155" onclick="document.getElementById('setupModal').close()">취소</button></dialog>
    <dialog id="accelModal"><h3 id="accelTitle" style="margin-bottom:15px;">가속</h3><div id="accelOptions" class="item-grid" style="grid-template-columns:1fr 1fr;"></div><button class="action-btn" style="margin-top:15px;" onclick="applyAccel()">적용</button><button class="action-btn" style="background:#334155" onclick="document.getElementById('accelModal').close()">취소</button></dialog>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7JjMhgFb6qw_NloERkHIwil9id-UOcJI",
        authDomain: "my-crk-timer.firebaseapp.com",
        projectId: "my-crk-timer",
        storageBucket: "my-crk-timer.firebasestorage.app",
        messagingSenderId: "239900291854",
        appId: "1:239900291854:web:55880a710ae6e131dc1d5f",
        databaseURL: "https://my-crk-timer-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const INITIAL_STATE = { kp:false, bg:"", stam:{normal:{c:0, m:208, e:0}, thick:{c:0, m:140, e:0}, fate:{c:0, m:100, e:0}}, arena:0, fount:Math.floor(Date.now()/1000), prod:0, exp:0, bear_train:[0,0,0], bear_balloon:0, mining:[0,0,0,0,0,0], tasks:[] };
    let state = JSON.parse(JSON.stringify(INITIAL_STATE));
    let tAccel=null, tSetup=null, notified={};

    db.ref('crk_data').on('value', (s) => {
        const v = s.val();
        if(v) { state = Object.assign(state, v); render(); } 
        else { db.ref('crk_data').set(INITIAL_STATE); }
    });

    function save() { db.ref('crk_data').update(state); }
    function notify(id, m) { if(!notified[id]) { notified[id]=true; if(window.qt){ new QWebChannel(qt.webChannelTransport, function(c){c.objects.backend.show_toast("CRK", m);}); } } }

    function switchView(v, b) { document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active')); document.getElementById(v).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active')); b.classList.add('active'); }
    function fmt(s) { if(s<=0) return "00:00:00"; let d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60); let t=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; return d>0 ? `${d}d ${t}` : t; }

    function clickTracking(t) { let n = Math.floor(Date.now()/1000); if(t==='arena'){ if(state.arena>n) state.arena=0; else {state.arena=n+(state.kp?600:1800); notified['arena']=false;} } else if(t==='fount') state.fount=n; else if(t==='prod') state.prod=(state.prod>0)?0:n; save(); }
    
    function openStamModal(k, t) { tSetup='stam_'+k; document.getElementById('setupTitle').innerText=t; document.getElementById('setupBody').innerHTML=`<div class="input-group"><label>현재 / 최대</label><div style="display:flex; gap:10px;"><input type="number" id="sC" value="${state.stam[k].c}"> / <input type="number" id="sM" value="${state.stam[k].m}"></div></div>`; document.getElementById('btnReset').style.display='none'; document.getElementById('setupModal').showModal(); }
    function openSetupModal(id, t) { tSetup=id; document.getElementById('setupTitle').innerText=t; document.getElementById('btnReset').style.display='block'; let h=`<div class="input-group"><label>설정 (시:분)</label><div style="display:flex; gap:10px;"><input type="number" id="setH" placeholder="시"> : <input type="number" id="setM" placeholder="분"></div></div>`; if(id==='exp'||id.startsWith('m_')) h=`<select id="setT"><option value="custom">직접입력</option><option value="8">8시간</option><option value="11.5">11.5시간</option><option value="24">24시간</option></select>`+h; document.getElementById('setupBody').innerHTML=h; document.getElementById('setupModal').showModal(); }
    function applySetup() { let n = Math.floor(Date.now()/1000); if(tSetup.startsWith('stam_')){ let k=tSetup.split('_')[1], c=parseInt(document.getElementById('sC').value)||0, m=parseInt(document.getElementById('sM').value)||1; let u=(k==='normal'&&state.kp)?240:(k==='normal'?300:(k==='thick'?600:900)); state.stam[k].c=c; state.stam[k].m=m; state.stam[k].e=(c<m)?n+(m-c)*u:0; } else { let sec=0; if(document.getElementById('setT') && document.getElementById('setT').value!=='custom') sec=parseFloat(document.getElementById('setT').value)*3600; else sec=(parseInt(document.getElementById('setH').value)||0)*3600+(parseInt(document.getElementById('setM').value)||0)*60; if(sec>0){ if(tSetup==='exp') {state.exp=n+sec; notified['exp']=false;} else if(tSetup.startsWith('tr_')) state.bear_train[tSetup.split('_')[1]]=n+sec; else if(tSetup==='bal') state.bear_balloon=n+sec; else if(tSetup.startsWith('m_')) state.mining[tSetup.split('_')[1]]=n+sec; else if(tSetup.startsWith('t_')) state.tasks[tSetup.split('_')[1]].end=n+sec; } } save(); document.getElementById('setupModal').close(); }
    function resetSetup() { if(tSetup==='exp') state.exp=0; else if(tSetup.startsWith('tr_')) state.bear_train[tSetup.split('_')[1]]=0; else if(tSetup==='bal') state.bear_balloon=0; else if(tSetup.startsWith('m_')) state.mining[tSetup.split('_')[1]]=0; save(); document.getElementById('setupModal').close(); }
    function openAccelModal(id, t) { if(event) event.stopPropagation(); tAccel=id; let opts=[["1m",60],["10m",600],["1h",3600],["12h",43200]]; let h=''; opts.forEach((o,i)=>h+=`<div><label>${o[0]}</label><input type="number" id="accel_${i}" value="0"></div>`); document.getElementById('accelOptions').innerHTML = h; document.getElementById('accelModal').showModal(); }
    function applyAccel() { let opts=[60,600,3600,43200], tot=0; opts.forEach((s,i)=>tot+=s*(parseInt(document.getElementById(`accel_${i}`).value)||0)); if(tot>0){ let n=Math.floor(Date.now()/1000); if(tAccel==='exp') state.exp=Math.max(n, state.exp-tot); else if(tAccel.startsWith('tr_')) state.bear_train[tAccel.split('_')[1]]=Math.max(n, state.bear_train[tAccel.split('_')[1]]-tot); else if(tAccel==='bal') state.bear_balloon=Math.max(n, state.bear_balloon-tot); else if(tAccel.startsWith('m_')) state.mining[tAccel.split('_')[1]]=Math.max(n, state.mining[tAccel.split('_')[1]]-tot); else if(tAccel.startsWith('t_')) state.tasks[tAccel.split('_')[1]].end=Math.max(n, state.tasks[tAccel.split('_')[1]].end-tot); save(); } document.getElementById('accelModal').close(); }

    function addTask() { let n=document.getElementById('mName').value, d=parseInt(document.getElementById('mD').value)||0, h=parseInt(document.getElementById('mH').value)||0, m=parseInt(document.getElementById('mM').value)||0; let s=(d*86400)+(h*3600)+(m*60); if(n && s>0){ if(!state.tasks) state.tasks=[]; state.tasks.push({name:n, end:Math.floor(Date.now()/1000)+s}); save(); document.getElementById('mName').value=''; switchView('dashboard', document.querySelectorAll('.nav-btn')[0]); } }
    function recoverLegacyData() { try { const d = JSON.parse(decodeURIComponent(atob(document.getElementById('legacyCode').value.trim()))); if(confirm("클라우드 데이터를 덮어씌울까요?")) { db.ref('crk_data').set(d).then(()=>location.reload()); } } catch(e){ alert("잘못된 코드"); } }

    function drawItem(title, end, id, theme, isT=false, idx=0) {
        let n=Math.floor(Date.now()/1000), run=end>n, isE=end>0 && end<=n;
        let vStr=run ? fmt(end-n) : (isE ? "END" : "READY"), vCls=isE ? "text-gray" : theme;
        let btn = isT ? `<div class="task-btn-container"><div class="task-btn-half" onclick="openAccelModal('${id}','${title}')">▶▶▶</div><div class="task-btn-half" onclick="event.stopPropagation(); state.tasks.splice(${idx},1); save();" style="background:#E11D48">✖</div></div>` : `<div class="item-btn-area" onclick="openAccelModal('${id}','${title}')">▶▶▶ 가속</div>`;
        return `<div class="item"><div class="item-click-area" onclick="openSetupModal('${isT?'t_'+idx:id}','${title}')"><div class="item-title">${title}</div><div class="item-val ${vCls}">${vStr}</div></div>${btn}</div>`;
    }

    function render() {
        const now = Math.floor(Date.now()/1000);
        if(!document.getElementById('grid-stam')) return;
        
        // 에너지
        let h_s=''; ['normal','thick','fate'].forEach(k => {
            let d=state.stam[k], r=d.e-now, n=k==='normal'?'기본':k==='thick'?'두툼':'운명';
            let u=(k==='normal'&&state.kp)?240:300; if(k==='thick') u=600; if(k==='fate') u=900;
            if(r>0) h_s += `<div class="item"><div class="item-click-area" onclick="openStamModal('${k}','${n}')"><div class="item-title">${n}</div><div class="item-val text-white">${d.m-Math.ceil(r/u)}/${d.m}</div><div class="text-cyan" style="font-size:10px;">${fmt(r)}</div></div></div>`;
            else h_s += `<div class="item"><div class="item-click-area" onclick="openStamModal('${k}','${n}')"><div class="item-title">${n}</div><div class="item-val text-cyan">MAX</div></div></div>`;
        });
        document.getElementById('grid-stam').innerHTML = h_s;

        // 트래킹
        document.getElementById('grid-track').innerHTML = `<div class="item"><div class="item-click-area" onclick="clickTracking('arena')"><div class="item-title">아레나</div><div class="item-val text-purple">${state.arena>now?fmt(state.arena-now):'READY'}</div></div></div><div class="item"><div class="item-click-area" onclick="clickTracking('fount')"><div class="item-title">분수</div><div class="item-val text-white">${fmt(now-state.fount)}</div></div></div><div class="item"><div class="item-click-area" onclick="clickTracking('prod')"><div class="item-title">생산</div><div class="item-val text-white">${state.prod>0?fmt(now-state.prod):'OFF'}</div></div></div>`;
        
        // 탐사
        document.getElementById('grid-exp').innerHTML = drawItem("탐사", state.exp, "exp", "text-rose");
        
        // 열차
        let h_tr=''; [0,1,2].forEach(i => h_tr += drawItem("열차", state.bear_train[i], 'tr_'+i, "text-pink"));
        document.getElementById('grid-train').innerHTML = h_tr;
        
        // 열기구
        document.getElementById('grid-bal').innerHTML = drawItem("열기구", state.bear_balloon, "bal", "text-sky");
        
        // 채굴
        let h_m=''; [0,1,2,3,4,5].forEach(i => h_m += drawItem("채굴", state.mining[i], 'm_'+i, "text-orange"));
        document.getElementById('grid-mine').innerHTML = h_m;

        // 수동 작업
        if(state.tasks && state.tasks.length>0){
            document.getElementById('row-tasks').style.display='flex';
            let h_t=''; state.tasks.forEach((t,i) => h_t += drawItem(t.name, t.end, 't_'+i, "text-mint", true, i));
            document.getElementById('grid-tasks').innerHTML = h_t;
        } else document.getElementById('row-tasks').style.display='none';
    }
    setInterval(render, 1000);
</script>
</body>
</html>
