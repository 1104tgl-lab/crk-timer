<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRK PRO LIVE v15.2 - Smart Home AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0F172A; --text-main: #FFFFFF; --text-sub: #94A3B8;     
            --c-cyan: #00E6F6; --c-purple: #9D4EDD; --c-pink: #EC4899;       
            --c-rose: #F43F5E; --c-sky: #0EA5E9; --c-orange: #F59E0B;     
            --c-green: #10B981; --c-mint: #2DD4BF; --bg-btn: rgba(15, 23, 42, 0.95);
            --c-gold: #FFD700;
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-body); 
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; 
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #loading-overlay { position: fixed; inset: 0; background: var(--bg-body); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        
        /* Sidebar */
        .sidebar-wrapper { width: 100%; height: 60px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .sidebar { width: 100%; height: 100%; display: flex; flex-direction: row; padding: 0 15px; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 900; color: var(--c-cyan); text-shadow: 0 0 10px rgba(0, 230, 246, 0.3); }
        .nav-group { display: flex; gap: 8px; }
        .nav-btn { background: transparent; border: none; color: var(--text-sub); padding: 10px; font-size: 18px; cursor: pointer; border-radius: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 8px; }
        .nav-btn span { display: none; font-size: 14px; font-weight: 700; }
        .nav-btn.active { color: var(--text-main); background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .nav-btn.active span { display: inline; }
        .nav-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }
        
        .main-content { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .view-section { display: none; width: 100%; max-width: 1400px; margin: 0 auto; flex-direction: column; gap: 15px; }
        .view-section.active { display: flex; animation: viewSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes viewSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Card System */
        .card { 
            position: relative; background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            animation: cardEntrance 0.6s ease-out both;
        }
        @keyframes cardEntrance { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; z-index: 1; }
        
        .card-stam::before { background: var(--c-cyan); }
        .card-track::before { background: var(--c-purple); }
        .card-dispatch::before { 
            background: linear-gradient(to bottom, var(--c-rose), var(--c-sky), var(--c-pink)); 
            background-size: 100% 300%; animation: flowGradient 8s ease infinite;
        }
        .card-mine::before { background: var(--c-orange); }
        .card-tasks::before { background: var(--c-mint); }
        .card-hot::before { background: linear-gradient(to bottom, var(--c-rose), var(--c-orange)); }
        .card-homework::before { background: var(--c-gold); }
        @keyframes flowGradient { 0%, 100% { background-position: 0% 0%; } 50% { background-position: 0% 100%; } }

        /* Grid Layouts */
        .item-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
        .energy-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }

        .item { 
            background: rgba(15, 23, 42, 0.7); border-radius: 16px; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden; 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, border-color 0.3s, background 0.3s;
        }
        .item:hover { transform: translateY(-5px) scale(1.02); border-color: rgba(255,255,255,0.2); background: rgba(25, 33, 50, 0.95); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
        
        .item-click-area { padding: 16px 10px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .item-title { font-size: 10px; color: var(--text-sub); font-weight: bold; margin-bottom: 6px; opacity: 0.8; transition: color 0.3s; }
        .item:hover .item-title { color: white; }
        .item-val { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; transition: transform 0.3s; }
        .item:hover .item-val { transform: scale(1.05); }
        .item-subtext { font-size: 10px; color: var(--c-cyan); margin-top: 4px; font-weight: 600; }
        
        /* Accel Bar */
        .item-accel-bar { 
            width: 100%; padding: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: var(--text-sub); background: rgba(255, 255, 255, 0.02); 
            border-top: 1px solid rgba(255,255,255,0.03); transition: all 0.3s; opacity: 0.6;
        }
        .item-accel-bar:hover { background: rgba(255,255,255,0.15); color: white; opacity: 1; }
        .item-accel-bar svg { width: 14px; height: 14px; transition: transform 0.3s; }
        .item-accel-bar:hover svg { transform: translateX(3px); }

        /* Status Effects */
        .is-ready { animation: pulseReady 2s ease-in-out infinite; }
        @keyframes pulseReady {
            0%, 100% { background: rgba(16, 185, 129, 0.02); border-color: rgba(16, 185, 129, 0.1); }
            50% { background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        }
        .is-max { animation: glowMax 3s ease-in-out infinite; }
        @keyframes glowMax {
            0%, 100% { border-color: rgba(255, 255, 255, 0.05); }
            50% { border-color: rgba(0, 230, 246, 0.4); box-shadow: inset 0 0 8px rgba(0, 230, 246, 0.1); }
        }
        .is-done { border-color: rgba(16, 185, 129, 0.6) !important; background: rgba(16, 185, 129, 0.15) !important; }
        .is-alert { border-color: var(--c-rose) !important; animation: pulseAlert 1.5s infinite; }
        @keyframes pulseAlert { 0%, 100% { box-shadow: 0 0 0px rgba(244, 63, 94, 0); } 50% { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); } }

        @media (min-width: 901px) {
            body { flex-direction: row; }
            .sidebar-wrapper { width: 80px; height: 100vh; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.05); }
            .sidebar { flex-direction: column; padding: 35px 10px; }
            .logo { margin-bottom: 40px; }
            .nav-group { flex-direction: column; width: 100%; gap: 15px; }
            .nav-btn { width: 50px; height: 50px; justify-content: center; padding: 0; }
            .nav-btn span { display: none !important; }
            .main-content { padding: 15px 50px; }
        }

        /* Modals */
        dialog { margin: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; background: rgba(15, 23, 42, 0.98); color: white; padding: 30px; width: 95%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); outline: none; }
        dialog[open] { animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--c-cyan); background: rgba(0,0,0,0.5); }
        .action-btn { background: var(--c-purple); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(157, 78, 221, 0.3); }
        .dialog-btns { margin-top: 20px; display: flex; gap: 10px; }

        /* Text Colors */
        .text-cyan { color: var(--c-cyan); } .text-purple { color: var(--c-purple); } .text-pink { color: var(--c-pink); }
        .text-rose { color: var(--c-rose); } .text-sky { color: var(--c-sky); } .text-orange { color: var(--c-orange); }
        .text-mint { color: var(--c-mint); } .text-white { color: #FFF; } .text-gray { color: #64748B; }
        .text-gold { color: var(--c-gold); } .text-green { color: var(--c-green); }

        /* AI Briefing Modal */
        #aiModal .ai-content { font-size: 14px; line-height: 1.6; color: #cbd5e1; }
        #aiModal .ai-content h4 { color: var(--c-cyan); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        #aiModal .ai-content ul { list-style: none; padding: 0; }
        #aiModal .ai-content li { margin-bottom: 8px; position: relative; padding-left: 20px; }
        #aiModal .ai-content li::before { content: '✨'; position: absolute; left: 0; }

        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--c-cyan); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--c-cyan), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--c-cyan), 1em 0 0 var(--c-cyan); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div style="font-size: 50px; margin-bottom: 20px; animation: bounce 2s infinite;">💎</div>
        <h2 style="color: var(--c-cyan); letter-spacing: 2px; font-size: 12px;">CRK PRO CONNECTING</h2>
    </div>

    <input type="file" id="bgInput" accept="image/*" style="display: none;">
    
    <div class="sidebar-wrapper">
        <div class="sidebar">
            <div class="logo">💎</div>
            <div class="nav-group">
                <button class="nav-btn active" onclick="switchView('dashboard', this)" title="대시보드">🏠<span>홈</span></button>
                <button class="nav-btn" onclick="switchView('timeboard', this)" title="타임보드">🕒<span>시간</span></button>
                <button class="nav-btn" onclick="switchView('settings', this)" title="설정">⚙️<span>설정</span></button>
                <button class="nav-btn" onclick="getAIBriefing()" title="✨ AI 비서" style="color: var(--c-cyan);">✨</button>
            </div>
            <button class="nav-btn" onclick="document.getElementById('bgInput').click()" style="margin-top:auto" title="배경 변경">🖼️</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="view-section active">
            <div class="card card-stam"><div class="energy-grid" id="main-energy-grid"></div></div>
            <div class="card card-homework">
                <div style="font-size:11px; font-weight:800; color:var(--c-gold); margin-bottom:12px; display:flex; align-items:center; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:6px; height:6px; background:var(--c-gold); border-radius:50%;"></span> 일일 숙제 리스트 (00시 초기화)</div>
                    <div id="homework-count" style="font-size:10px; opacity:0.7;"></div>
                </div>
                <div class="item-grid" id="homework-grid"></div>
            </div>
            <div id="hot-timer-section" class="card card-hot">
                <div style="font-size:11px; font-weight:800; color:var(--c-rose); margin-bottom:12px; display:flex; align-items:center; gap:8px;"><span style="display:inline-block; width:8px; height:8px; background:var(--c-rose); border-radius:50%; animation: pulseAlert 1.5s infinite;"></span> 긴급 관리 항목 (완료 및 10분 미만)</div>
                <div class="item-grid" id="dashboard-hot-grid"></div>
            </div>
        </div>

        <div id="timeboard" class="view-section">
            <div class="card card-track"><div class="item-grid" id="grid-track"></div></div>
            <div class="card card-dispatch"><div class="item-grid" id="grid-dispatch"></div></div>
            <div class="card card-mine"><div class="item-grid" id="grid-mine"></div></div>
            <div id="row-tasks" style="display:none;" class="card card-tasks"><div class="item-grid" id="grid-tasks" style="grid-template-columns: repeat(3, 1fr) !important;"></div></div>

        <div id="settings" class="view-section">
            <div class="card card-track">
                <div style="font-size:15px; font-weight:800; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">🕒 타이머 수동 등록</div>
                <div class="input-group"><label>작업 명칭</label><input type="text" id="mName" placeholder="예: 상점 업그레이드"></div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    <div class="input-group"><label>일</label><input type="number" id="mD" value="0"></div>
                    <div class="input-group"><label>시</label><input type="number" id="mH" value="0"></div>
                    <div class="input-group"><label>분</label><input type="number" id="mM" value="0"></div>
                </div>
                <button class="action-btn" onclick="addTask()">등록하기</button>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <dialog id="setupModal">
        <h3 id="setupTitle" style="margin-bottom:15px; font-weight: 800;">데이터 수정</h3>
        <div id="setupBody"></div>
        <div class="dialog-btns">
            <button class="action-btn" style="background:var(--c-cyan); color:#000; flex:2;" onclick="applySetup()">확인</button>
            <button id="btnDelete" class="action-btn" style="background:var(--c-rose); flex:1.2; display:none;" onclick="deleteCurrentTask()">삭제</button>
            <button class="action-btn" style="background:#334155; flex:1;" onclick="document.getElementById('setupModal').close()">취소</button>
        </div>
    </dialog>

    <dialog id="accelModal">
        <h3 id="accelTitle" style="margin-bottom:15px; font-weight: 800;">⚡ 가속 설정</h3>
        <div id="accelOptions" class="item-grid" style="grid-template-columns: 1fr 1fr;"></div>
        <button class="action-btn" style="margin-top:20px;" onclick="applyAccel()">가속 적용</button>
        <button class="action-btn" style="background:#334155; margin-top:10px;" onclick="document.getElementById('accelModal').close()">취소</button>
    </dialog>

    <dialog id="aiModal">
        <h3 style="margin-bottom:15px; font-weight: 800; color: var(--c-cyan);">✨ AI 운영 비서</h3>
        <div id="aiBody" class="ai-content"><div style="text-align:center; padding:20px;"><span class="loading-dots">전략 분석 중</span></div></div>
        <div class="dialog-btns"><button class="action-btn" style="background:var(--c-cyan); color:#000;" onclick="document.getElementById('aiModal').close()">알겠습니다</button></div>
    </dialog>

<script>
    const apiKey = "";
    const firebaseConfig = {
        apiKey: "AIzaSyC7JjMhgFb6qw_NloERkHIwil9id-UOcJI",
        authDomain: "my-crk-timer.firebaseapp.com",
        projectId: "my-crk-timer",
        storageBucket: "my-crk-timer.firebasestorage.app",
        messagingSenderId: "239900291854",
        appId: "1:239900291854:web:55880a710ae6e131dc1d5f",
        databaseURL: "https://my-crk-timer-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const HOMEWORK_LIST = ["현상수배", "소원나무", "일일 선물", "광고가속", "길드출석", "광장일일 미션", "깃펜사용"];
    const INITIAL_STATE = { kp:false, bg:"", stam:{normal:{c:0, m:208, e:0, u:300}, thick:{c:0, m:140, e:0, u:540}, fate:{c:0, m:100, e:0, u:1080}}, arena_tickets:{normal:{c:0, m:10, e:0, u:3600}, arcade:{c:0, m:8, e:0, u:7200}}, arena:0, fount:0, prod:0, trade:0, exp:0, bear_train:[0,0,0], bear_balloon:0, mining:[0,0,0,0,0,0], tasks:[], homework: { items: {}, lastReset: "" }, postOffice: { count: 0, lastReset: "" } };
    let state = JSON.parse(JSON.stringify(INITIAL_STATE));
    let notified={}; let tSetup, tAccel, currentTaskIdx;

    function checkDailyReset() {
        const today = new Date().toLocaleDateString('ko-KR');
        let changed = false;
        if (!state.homework || state.homework.lastReset !== today) {
            const newItems = {}; HOMEWORK_LIST.forEach(item => newItems[item] = false);
            state.homework = { items: newItems, lastReset: today }; changed = true;
        }
        if (!state.postOffice || state.postOffice.lastReset !== today) { state.postOffice = { count: 0, lastReset: today }; changed = true; }
        if(changed) save();
    }

    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "당신은 쿠키런: 킹덤 운영 전문가입니다. 사용자 상태를 분석하여 한국어로 친절한 조언을 3줄 이내로 제공하세요. 마크다운 형식을 사용하세요." }] } };
        let delay = 1000;
        for (let i = 0; i < 5; i++) {
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (response.ok) { const data = await response.json(); return data.candidates?.[0]?.content?.parts?.[0]?.text || "분석 불가"; }
            } catch (e) {}
            await new Promise(res => setTimeout(res, delay)); delay *= 2;
        }
        return "연결 실패";
    }

    async function getAIBriefing() {
        document.getElementById('aiBody').innerHTML = '<div style="text-align:center; padding:20px;"><span class="loading-dots">전략 분석 중</span></div>';
        document.getElementById('aiModal').showModal();
        const summary = { energy: state.stam, tickets: state.arena_tickets, homework: state.homework.items, post: state.postOffice.count };
        const advice = await callGemini(`사용자 상태: ${JSON.stringify(summary)}. 지금 가장 시급한 작업과 효율적인 전략 제안.`);
        document.getElementById('aiBody').innerHTML = `<div class="ai-text">${advice.replace(/\n/g, '<br>')}</div>`;
    }

    function toggleHomework(name) { state.homework.items[name] = !state.homework.items[name]; save(); render(); }
    function claimPostOffice() { if(state.postOffice.count < 3) { state.postOffice.count++; save(); render(); } }

    db.ref('crk_data').on('value', (s) => {
        const v = s.val();
        if(v) { 
            state = { ...INITIAL_STATE, ...v }; 
            if(!state.arena_tickets) state.arena_tickets = INITIAL_STATE.arena_tickets;
            if(!state.homework) { const newItems = {}; HOMEWORK_LIST.forEach(item => newItems[item] = false); state.homework = { items: newItems, lastReset: "" }; }
            if(!state.postOffice) state.postOffice = { count: 0, lastReset: "" };
            if(state.bg) document.body.style.backgroundImage = `url('${state.bg}')`; 
        } 
        checkDailyReset(); document.getElementById('loading-overlay').style.display = 'none'; render(); 
    });

    function save() { db.ref('crk_data').update(state); }

    function notify(id, m) { 
        if(!notified[id]) { 
            notified[id]=true; 
            if(window.qt && window.qt.webChannelTransport){ 
                new QWebChannel(qt.webChannelTransport, function(c){
                    c.objects.backend.show_toast("CRK 알림", m);
                }); 
            } 
        } 
    }

    function fmt(s) { if(s<=0) return "00:00:00"; let d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60); let t=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; return d>0 ? `${d}d ${t}` : t; }
    
    function switchView(v, b) { 
        document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active')); 
        document.getElementById(v).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active')); 
        b.classList.add('active'); render(); 
    }

    function clickTracking(t) { let n = Math.floor(Date.now()/1000); if(t==='fount') state.fount = (state.fount > 0) ? 0 : n; else if(t==='prod') state.prod = (state.prod > 0) ? 0 : n; else if(t==='trade') openSetupModal('trade', '무역소 갱신'); save(); }
    function openCounterModal(path, k, t) { tSetup=path+'_'+k; const target = (path==='stam') ? state.stam[k] : state.arena_tickets[k]; document.getElementById('setupTitle').innerText=t; document.getElementById('btnDelete').style.display='none'; document.getElementById('setupBody').innerHTML=`<div class="input-group"><label>현재 / 최대</label><div style="display:flex; gap:10px;"><input type="number" id="sC" value="${target.c}"> / <input type="number" id="sM" value="${target.m}"></div></div><div class="input-group"><label>개당 충전 시간 (${path==='stam'?'분':'시간'})</label><input type="number" step="0.1" id="sU" value="${(path==='stam' ? target.u/60 : target.u/3600).toFixed(1)}"></div>`; document.getElementById('setupModal').showModal(); }
    function openSetupModal(id, t) { tSetup=id; document.getElementById('setupTitle').innerText=t; document.getElementById('btnDelete').style.display = id.startsWith('t_') ? 'block' : 'none'; if(id.startsWith('t_')) currentTaskIdx = parseInt(id.split('_')[1]); let h=`<div class="input-group"><label>직접 입력 (시:분)</label><div style="display:flex; gap:10px;"><input type="number" id="setH" placeholder="시"> : <input type="number" id="setM" placeholder="분"></div></div>`; if(id==='exp'||id.startsWith('m_')||id==='trade') { let p = id==='trade' ? `<option value="6">6시간</option>` : `<option value="8">8시간</option><option value="11.5">11.5시간</option><option value="24">24시간</option>`; h=`<select id="setT" style="margin-bottom:10px; width:100%; padding:12px; border-radius:10px; background:#000; color:white;"><option value="custom">직접입력</option>${p}</select>`+h; } document.getElementById('setupBody').innerHTML=h; document.getElementById('setupModal').showModal(); }
    function applySetup() { let n = Math.floor(Date.now()/1000); if(tSetup.startsWith('stam_') || tSetup.startsWith('tkt_')){ let p=tSetup.split('_'), path=p[0]==='stam'?'stam':'arena_tickets', k=p[1], target = state[path][k]; let c=parseInt(document.getElementById('sC').value)||0, m=parseInt(document.getElementById('sM').value)||1, uI=parseFloat(document.getElementById('sU').value); let u = (path==='stam') ? uI*60 : uI*3600; target.c=c; target.m=m; target.u=u; target.e=(c<m)?n+(m-c)*u:0; } else { let sec=0; if(document.getElementById('setT') && document.getElementById('setT').value!=='custom') sec=parseFloat(document.getElementById('setT').value)*3600; else sec=(parseInt(document.getElementById('setH').value)||0)*3600+(parseInt(document.getElementById('setM').value)||0)*60; if(sec>0){ if(tSetup==='exp') state.exp=n+sec; else if(tSetup==='trade') state.trade=n+sec; else if(tSetup.startsWith('tr_')) state.bear_train[tSetup.split('_')[1]]=n+sec; else if(tSetup==='bal') state.bear_balloon=n+sec; else if(tSetup.startsWith('m_')) state.mining[tSetup.split('_')[1]]=n+sec; else if(tSetup.startsWith('t_')) state.tasks[currentTaskIdx].end=n+sec; notified[tSetup]=false; } } save(); document.getElementById('setupModal').close(); }
    function deleteCurrentTask() { state.tasks.splice(currentTaskIdx, 1); save(); document.getElementById('setupModal').close(); }
    function openAccelModal(id, t) { if(event) event.stopPropagation(); tAccel=id; let opts=[["1분",60],["10분",600],["1시간",3600],["12시간",43200]]; let h=''; opts.forEach((o,i)=>h+=`<div><label style="font-size:10px;">${o[0]}</label><input type="number" id="accel_${i}" value="0" style="width:100%; padding:6px; border-radius:5px; background:#000; color:white; border:1px solid #333;"></div>`); document.getElementById('accelOptions').innerHTML = h; document.getElementById('accelModal').showModal(); }
    function applyAccel() { let opts=[60,600,3600,43200], tot=0; opts.forEach((s,i)=>tot+=s*(parseInt(document.getElementById(`accel_${i}`).value)||0)); if(tot>0){ let n=Math.floor(Date.now()/1000); const update = (v) => Math.max(n, v - tot); if(tAccel==='exp') state.exp=update(state.exp); else if(tAccel==='bal') state.bear_balloon=update(state.bear_balloon); else if(tAccel.startsWith('tr_')) state.bear_train[tAccel.split('_')[1]]=update(state.bear_train[tAccel.split('_')[1]]); else if(tAccel.startsWith('m_')) state.mining[tAccel.split('_')[1]]=update(state.mining[tAccel.split('_')[1]]); else if(tAccel.startsWith('t_')) state.tasks[parseInt(tAccel.split('_')[1])].end=update(state.tasks[parseInt(tAccel.split('_')[1])].end); notified[tAccel]=false; save(); } document.getElementById('accelModal').close(); }
    function addTask() { let n=document.getElementById('mName').value, s=(parseInt(document.getElementById('mD').value)||0)*86400+(parseInt(document.getElementById('mH').value)||0)*3600+(parseInt(document.getElementById('mM').value)||0)*60; if(n && s>0){ if(!state.tasks) state.tasks=[]; state.tasks.push({name:n, end:Math.floor(Date.now()/1000)+s}); save(); document.getElementById('mName').value=''; switchView('timeboard', document.querySelectorAll('.nav-btn')[1]); } }

    function drawItem(title, end, id, theme, isT=false, idx=0) {
        let n=Math.floor(Date.now()/1000), run=end>n;
        let vStr = run ? fmt(end-n) : "READY"; let targetId = isT ? 't_'+idx : id;
        return `<div class="item ${!run && end > 0 ? 'is-ready' : ''}"><div class="item-click-area" onclick="openSetupModal('${targetId}','${title}')"><div class="item-title">${title}</div><div class="item-val ${theme}">${vStr}</div></div><div class="item-accel-bar" onclick="event.stopPropagation(); openAccelModal('${targetId}','${title}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg></div></div>`;
    }

    function render() {
        const now = Math.floor(Date.now()/1000); const dt = new Date();
        
        let h_e=''; 
        [['stam','normal','기본'],['stam','thick','두툼'],['stam','fate','운명']].forEach(([p,k,n]) => {
            let d=state[p][k], r=d.e-now, isMax=r<=0;
            h_e += `<div class="item ${isMax?'is-max':''}" onclick="openCounterModal('${p}','${k}','${n}')"><div class="item-click-area"><div class="item-title">${n}</div><div class="item-val ${isMax?'text-cyan':'text-white'}">${isMax?'MAX':(d.m-Math.ceil(r/d.u))+'/'+d.m}</div>${!isMax?`<div class="item-subtext">${fmt(r)}</div>`:''}</div></div>`;
        });
        [['tkt','normal','아레나'],['tkt','arcade','아케이드']].forEach(([p,k,n]) => {
            let d=state.arena_tickets[k], r=d.e-now, isMax=r<=0;
            h_e += `<div class="item ${isMax?'is-max':''}" onclick="openCounterModal('${p}','${k}','${n}')"><div class="item-click-area"><div class="item-title">${n}</div><div class="item-val ${isMax?'text-pink':'text-white'}">${isMax?'MAX':(d.m-Math.ceil(r/d.u))+'/'+d.m}</div>${!isMax?`<div class="item-subtext">${fmt(r)}</div>`:''}</div></div>`;
        });

        if(state.postOffice.count < 3) {
            const h = dt.getHours(); const m = dt.getMinutes(); const isEvenHour = h % 2 === 0; const isPostTime = isEvenHour && m <= 20;
            if(isPostTime) {
                h_e += `<div class="item is-alert" onclick="claimPostOffice()"><div class="item-click-area"><div class="item-title text-rose">우체국</div><div class="item-val text-rose">READY</div><div class="item-subtext">${state.postOffice.count}/3 수령</div></div></div>`;
                notify('postoffice_' + h, '우체국 보상 수령 시간입니다! (READY)');
            } else {
                let targetH = isEvenHour ? h+2 : h+1; let td = new Date(dt); td.setHours(targetH,0,0,0);
                h_e += `<div class="item" style="opacity:0.7;"><div class="item-click-area"><div class="item-title">우체국</div><div class="item-val text-gray" style="font-size:14px;">${fmt(Math.floor((td-dt)/1000))}</div><div class="item-subtext">${state.postOffice.count}/3 수령</div></div></div>`;
            }
        }
        document.getElementById('main-energy-grid').innerHTML = h_e;

        let h_hw = ''; let doneCount = 0;
        HOMEWORK_LIST.forEach(name => {
            const isDone = state.homework.items[name]; if(isDone) doneCount++;
            h_hw += `<div class="item ${isDone ? 'is-done' : ''}" onclick="toggleHomework('${name}')"><div class="item-click-area" style="padding: 12px 10px;"><div class="item-title" style="margin-bottom:0;">${name}</div></div></div>`;
        });
        document.getElementById('homework-grid').innerHTML = h_hw;
        document.getElementById('homework-count').innerText = `${doneCount} / ${HOMEWORK_LIST.length} 완료`;

        let hotItems = [];
        if(state.trade > 0 && (state.trade <= now || state.trade - now < 600)) hotItems.push({t:'무역소', e:state.trade, id:'trade', theme:'text-purple'});
        if(state.exp > 0 && (state.exp <= now || state.exp - now < 600)) hotItems.push({t:'탐사', e:state.exp, id:'exp', theme:'text-rose'});
        if(state.bear_balloon > 0 && (state.bear_balloon <= now || state.bear_balloon - now < 600)) hotItems.push({t:'열기구', e:state.bear_balloon, id:'bal', theme:'text-sky'});
        state.bear_train.forEach((tm, i) => { if(tm > 0 && (tm <= now || tm - now < 600)) hotItems.push({t:'열차', e:tm, id:'tr_'+i, theme:'text-pink'}); });
        state.mining.forEach((tm, i) => { if(tm > 0 && (tm <= now || tm - now < 600)) hotItems.push({t:'채굴', e:tm, id:'m_'+i, theme:'text-orange'}); });
        state.tasks.forEach((tk, i) => { if(tk.end > 0 && (tk.end <= now || tk.end - now < 600)) hotItems.push({t:tk.name, e:tk.end, id:'t_'+i, theme:'text-mint', isT:true, idx:i}); });
        const hotGrid = document.getElementById('dashboard-hot-grid');
        if(hotItems.length > 0) {
            let h_hot = ''; hotItems.forEach(item => { h_hot += drawItem(item.t, item.e, item.id, item.theme, item.isT, item.idx); });
            hotGrid.innerHTML = h_hot;
        } else hotGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 25px; color: var(--text-sub); font-size: 11px; opacity: 0.6;">현재 긴급 관리 항목이 없습니다.</div>';

        document.getElementById('grid-track').innerHTML = `<div class="item ${state.fount>0?'':'is-ready'}"><div class="item-click-area" onclick="clickTracking('fount')"><div class="item-title">분수</div><div class="item-val ${state.fount>0?'text-purple':'text-white'}">${state.fount>0?fmt(now-state.fount):'READY'}</div></div></div><div class="item"><div class="item-click-area" onclick="clickTracking('prod')"><div class="item-title">생산중</div><div class="item-val ${state.prod>0?'text-purple':'text-white'}">${state.prod>0?fmt(now-state.prod):'OFF'}</div></div></div><div class="item ${state.trade<=now&&state.trade>0?'is-ready':''}"><div class="item-click-area" onclick="clickTracking('trade')"><div class="item-title">무역소</div><div class="item-val ${state.trade>now?'text-purple':'text-white'}">${state.trade>now?fmt(state.trade-now):'READY'}</div></div></div>`;
        let h_d = drawItem("탐사", state.exp, "exp", "text-rose") + drawItem("열기구", state.bear_balloon, "bal", "text-sky");
        state.bear_train.forEach((t, i) => h_d += drawItem("열차", t, 'tr_'+i, "text-pink"));
        document.getElementById('grid-dispatch').innerHTML = h_d;
        let h_m = ''; state.mining.forEach((t, i) => h_m += drawItem("채굴", t, 'm_'+i, "text-orange"));
        document.getElementById('grid-mine').innerHTML = h_m;
        if(state.tasks && state.tasks.length>0){
            document.getElementById('row-tasks').style.display='block';
            let h_t=''; state.tasks.forEach((t, i) => { 
                h_t += drawItem(t.name, t.end, 't_'+i, "text-mint", true, i); 
                if(t.end>0 && t.end<=now) notify('t_'+i, t.name+' 완료!'); 
            });
            document.getElementById('grid-tasks').innerHTML = h_t;
        } else document.getElementById('row-tasks').style.display='none';

        if(state.exp>0 && state.exp<=now) notify('exp', '탐사 완료!');
        if(state.trade>0 && state.trade<=now) notify('trade', '무역소 갱신!');
        if(state.bear_balloon>0 && state.bear_balloon<=now) notify('bal', '열기구 도착!');
    }
    setInterval(render, 1000);
</script>
</body>
</html>
