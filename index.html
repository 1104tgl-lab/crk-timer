<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRK PRO LIVE v13.4</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0F172A; --text-main: #FFFFFF; --text-sub: #94A3B8;     
            --c-cyan: #00E6F6; --c-purple: #9D4EDD; --c-pink: #EC4899;       
            --c-rose: #F43F5E; --c-sky: #0EA5E9; --c-orange: #F59E0B;     
            --c-green: #10B981; --c-mint: #2DD4BF; --bg-btn: rgba(15, 23, 42, 0.95);
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 상단바 고정 */
        .sidebar-wrapper { width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .sidebar { width: 100%; height: 100%; display: flex; flex-direction: row; padding: 0 15px; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 900; color: var(--c-cyan); }
        .nav-btn { background: transparent; border: none; color: var(--text-sub); padding: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; }
        .nav-btn.active { color: var(--text-main); background: rgba(255,255,255,0.1); }

        .main-content { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; width: 100%; max-width: 1400px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 카드 레이아웃 보강 */
        .row { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; width: 100%; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .card-header { font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* 아이템 그리드 */
        .item-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); }
        .item { background: rgba(15, 23, 42, 0.8); border-radius: 12px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .item-click-area { padding: 15px 5px; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-btn-area { background: var(--bg-btn); padding: 8px; display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .item-title { font-size: 10px; color: var(--text-sub); font-weight: bold; margin-bottom: 4px; text-align: center; }
        .item-val { font-size: 17px; font-weight: 900; text-align: center; }

        /* 🔥 UI 겹침 수정된 설정창 🔥 */
        .input-box-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        .input-group { flex: 1; min-width: 80px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); outline: none; }
        .action-btn { background: var(--c-purple); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }

        .text-cyan { color: var(--c-cyan); } .text-purple { color: var(--c-purple); } .text-rose { color: var(--c-rose); }
        .text-white { color: #FFF; } .text-gray { color: #64748B; }

        @media (min-width: 981px) {
            body { flex-direction: row; }
            .sidebar-wrapper { width: 75px; height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); }
            .sidebar { flex-direction: column; padding: 30px 10px; }
            .row { flex-direction: row; } .card { flex: 1; }
            .card-stam { flex: 1.2; } .card-track { flex: 1.8; }
        }
    </style>
</head>
<body>
    <input type="file" id="bgInput" accept="image/*" style="display: none;">
    <div class="sidebar-wrapper">
        <div class="sidebar">
            <div class="logo">💎 PRO</div>
            <div style="display:flex; flex-direction:inherit; gap:10px;">
                <button class="nav-btn active" onclick="switchView('dashboard', this)">📊</button>
                <button class="nav-btn" onclick="switchView('settings', this)">⚙️</button>
            </div>
            <button class="nav-btn" onclick="document.getElementById('bgInput').click()">🖼️</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="view-section active">
            <div class="row">
                <div class="card card-stam"><div class="card-header">에너지 관리</div><div class="item-grid" id="grid-stam"></div></div>
                <div class="card card-track"><div class="card-header">시스템 트래킹</div><div class="item-grid" id="grid-track"></div></div>
            </div>
            <div class="row">
                <div class="card"><div class="card-header">광산 탐사</div><div class="item-grid" id="grid-exp"></div></div>
                <div class="card" style="flex:2.5"><div class="card-header">물류 열차</div><div class="item-grid" id="grid-train"></div></div>
            </div>
            <div class="row"><div class="card"><div class="card-header">광맥 채굴</div><div class="item-grid" id="grid-mine"></div></div></div>
            <div class="row" id="row-tasks" style="display:none;"><div class="card"><div class="card-header">수동 작업</div><div class="item-grid" id="grid-tasks"></div></div></div>
        </div>

        <div id="settings" class="view-section">
            <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content: center;">
                <div class="card" style="width:100%; max-width:500px;">
                    <div class="card-header">⚙️ 프로젝트 등록</div>
                    <div class="input-group" style="margin-bottom:15px;"><label>작업명</label><input type="text" id="mName" placeholder="작업 이름 입력"></div>
                    <div class="input-box-grid">
                        <div class="input-group"><label>일(Day)</label><input type="number" id="mD" value="0"></div>
                        <div class="input-group"><label>시(Hour)</label><input type="number" id="mH" value="0"></div>
                        <div class="input-group"><label>분(Min)</label><input type="number" id="mM" value="0"></div>
                    </div>
                    <button class="action-btn" onclick="addTask()">등록하기</button>
                </div>

                <div class="card" style="width:100%; max-width:500px; border-color:var(--c-mint);">
                    <div class="card-header">🔄 이전 데이터 복구</div>
                    <p style="font-size:11px; color:var(--text-sub); margin-bottom:10px;">전 버전의 [동기화 코드]를 아래에 붙여넣으세요.</p>
                    <textarea id="legacyCode" style="width:100%; height:80px; background:rgba(0,0,0,0.3); color:white; padding:10px; border-radius:10px; border: 1px solid rgba(255,255,255,0.1); font-size:10px; resize:none;"></textarea>
                    <button class="action-btn" style="background:var(--c-mint); color:#000; margin-top:10px;" onclick="recoverLegacyData()">클라우드로 데이터 덮어쓰기</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // 🔥 파이어베이스 설정 - 주소(databaseURL)가 맞는지 꼭 확인하세요! 🔥
    const firebaseConfig = {
        apiKey: "AIzaSyC7JjMhgFb6qw_NloERkHIwil9id-UOcJI",
        authDomain: "my-crk-timer.firebaseapp.com",
        projectId: "my-crk-timer",
        storageBucket: "my-crk-timer.firebasestorage.app",
        messagingSenderId: "239900291854",
        appId: "1:239900291854:web:55880a710ae6e131dc1d5f",
        // 아래 주소가 실제 파이어베이스 콘솔의 주소와 일치해야 합니다!
        databaseURL: "https://my-crk-timer-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const INITIAL_STATE = { kp:false, bg:"", stam:{normal:{c:0, m:200, e:0}, thick:{c:0, m:140, e:0}, fate:{c:0, m:100, e:0}}, arena:0, fount:Math.floor(Date.now()/1000), prod:0, exp:0, bear_train:[0,0,0], bear_balloon:0, mining:[0,0,0,0,0,0], tasks:[] };
    let state = JSON.parse(JSON.stringify(INITIAL_STATE));

    // 실시간 동기화
    db.ref('crk_data').on('value', (s) => {
        const v = s.val();
        if(v) { state = Object.assign(state, v); render(); } 
        else { db.ref('crk_data').set(INITIAL_STATE); }
    });

    // 🔥 복구 로직 강화판 (성공/실패 피드백 추가) 🔥
    function recoverLegacyData() {
        const code = document.getElementById('legacyCode').value.trim();
        if(!code) return alert("복구 코드를 입력해 주세요.");
        try {
            const decoded = JSON.parse(decodeURIComponent(atob(code)));
            if(confirm("기존 클라우드 데이터를 무시하고 이 데이터로 덮어씌울까요?")) {
                db.ref('crk_data').set(decoded)
                    .then(() => { alert("✅ 복구 성공! 모든 기기가 동기화되었습니다."); location.reload(); })
                    .catch((err) => { alert("❌ 서버 쓰기 실패: 규칙(Rules) 설정을 확인하세요.\\n" + err.message); });
            }
        } catch(e) { alert("❌ 잘못된 형식의 코드입니다. 다시 복사해 오세요."); }
    }

    function save() { db.ref('crk_data').update(state); }
    function switchView(v, b) { document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active')); document.getElementById(v).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active')); b.classList.add('active'); }
    function fmt(s) { if(s<=0) return "00:00:00"; let d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60); let t=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; return d>0 ? `${d}d ${t}` : t; }
    
    function addTask() { 
        let n=document.getElementById('mName').value, d=parseInt(document.getElementById('mD').value)||0, h=parseInt(document.getElementById('mH').value)||0, m=parseInt(document.getElementById('mM').value)||0;
        let s = (d*86400) + (h*3600) + (m*60);
        if(n && s>0){ if(!state.tasks) state.tasks=[]; state.tasks.push({name:n, end:Math.floor(Date.now()/1000)+s}); save(); document.getElementById('mName').value=''; switchView('dashboard', document.querySelectorAll('.nav-btn')[0]); }
    }

    function render() {
        const now = Math.floor(Date.now()/1000);
        if(!document.getElementById('grid-stam')) return;
        
        let h_s=''; ['normal','thick','fate'].forEach(k => {
            let d=state.stam[k], r=d.e-now, n=k==='normal'?'기본':k==='thick'?'두툼':'운명';
            h_s += `<div class="item"><div class="item-click-area"><div class="item-title">${n}</div><div class="item-val">${r>0 ? (d.m-Math.ceil(r/((k==='normal'&&state.kp)?240:300)))+'/'+d.m : 'MAX'}</div></div></div>`;
        });
        document.getElementById('grid-stam').innerHTML = h_s;
        
        document.getElementById('grid-track').innerHTML = `<div class="item"><div class="item-click-area"><div class="item-title">아레나</div><div class="item-val text-purple">${state.arena>now?fmt(state.arena-now):'READY'}</div></div></div>`;
        
        if(state.tasks && state.tasks.length>0){
            document.getElementById('row-tasks').style.display='flex';
            let h_t=''; state.tasks.forEach((t,i) => {
                h_t += `<div class="item"><div class="item-click-area"><div class="item-title">${t.name}</div><div class="item-val">${t.end>now?fmt(t.end-now):'END'}</div></div><div class="item-btn-area" onclick="state.tasks.splice(${i},1); save();" style="background:#E11D48">✖</div></div>`;
            });
            document.getElementById('grid-tasks').innerHTML = h_t;
        } else document.getElementById('row-tasks').style.display='none';
    }
    setInterval(render, 1000);
</script>
</body>
</html>
