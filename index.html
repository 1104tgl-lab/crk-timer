<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CRK 2026 Dashboard</title>
    <style>
        body {
            /* 다크 글래스모피즘 분위기 조성을 위한 어두운 테마 배경 */
            background: linear-gradient(135deg, #1e050f, #31081f);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        /* 벤토 그리드 레이아웃 적용 */
       .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
       .glass-card {
            /* 다크 글래스모피즘 2.0 규칙 적용 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
       .glass-card:hover { transform: translateY(-3px); }
        
        /* 비대칭적 정보 위계화 (타일 사이즈 조절) */
       .hero-tile { grid-column: span 2; grid-row: span 2; }
       .feature-tile { grid-column: span 2; }
       .accent-tile { grid-column: span 1; }

        h2 { margin-top: 0; font-size: 1.2rem; color: #ffebf0; font-weight: 600; }
       .data-large { font-size: 2.8rem; font-weight: 800; color: #ff4757; margin: 10px 0; }
       .data-medium { font-size: 1.8rem; font-weight: bold; color: #2ed573; margin: 10px 0;}
        
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div class="bento-grid">
        <div class="glass-card hero-tile">
            <h2>어둠의 절대자 비스트 레이드</h2>
            <div class="data-large" id="raidTimer">06:00:00</div>
            <p>보유 티켓: 5/6 (6시간마다 1장 자동 충전)</p>
            <button onclick="startRaidTimer()">충전 시작 및 푸시 알림 예약</button>
        </div>

        <div class="glass-card feature-tile">
            <h2>베놈 도우 쿠키 스킬 사이클</h2>
            <div class="data-medium" id="venomTimer">00:12.5</div>
            <p>레드 벨벳 드래곤 토벌전 전용 맹독 카운터 연계 타이머</p>
            <button onclick="startVenomTimer()">12.5초 전투 오버레이 작동</button>
        </div>

        <div class="glass-card feature-tile">
            <h2>뻐꾸기 타운 스퀘어</h2>
            <div class="data-medium">00:29:50</div>
            <p>신비한 NPC 상점 체류 시간</p>
            <button onclick="sendBackendToast('타운 스퀘어', '특별 상인이 곧 떠납니다! 접속해서 재화를 소모하세요.')">리마인더 설정</button>
        </div>
        
        <div class="glass-card accent-tile">
            <h2>데카당트 초코 타워</h2>
            <div class="data-medium" style="color: #ffa502;">01:15</div>
            <button onclick="sendBackendToast('케이크 타워', '열쇠가 모두 충전되었습니다.')">초코 열쇠 알림</button>
        </div>
        <div class="glass-card accent-tile">
            <h2>생산 건물 관리</h2>
            <div class="data-medium" style="color: #ffa502;">00:05</div>
            <button onclick="sendBackendToast('생산 라인 완료', '소원나무와 별사탕 수령이 가능합니다.')">즉시 수령 알림</button>
        </div>
    </div>

    <script>
        let backend;
        
        // Python PyQt/PySide 백엔드와 객체 연결
        new QWebChannel(qt.webChannelTransport, function (channel) {
            backend = channel.objects.backend;
        });

        function sendBackendToast(title, message) {
            if(backend) {
                backend.show_toast(title, message); // Python 백엔드로 윈도우 네이티브 알림 호출
            } else {
                console.log(`[데스크톱 알림 전송] ${title}: ${message}`);
            }
        }

        // 비스트 레이드 티켓 6시간 정밀 타이머 로직
        function startRaidTimer() {
            let timeLeft = 21600; // 6시간
            setInterval(() => {
                timeLeft--;
                let h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
                let m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('raidTimer').innerText = `${h}:${m}:${s}`;
                
                if(timeLeft <= 0) {
                    sendBackendToast("레이드 티켓 충전 완료!", "비스트 레이드 티켓 1장이 충전되었습니다. 최대 한도(6장) 초과에 주의하세요.");
                    timeLeft = 21600;
                }
            }, 1000);
        }

        // 베놈 도우 쿠키 스킬 12.5초 오버레이 타이머 (초단기 마이크로 컨트롤 지원)
        function startVenomTimer() {
            let timeLeft = 12.5;
            document.getElementById('venomTimer').style.color = "#ff4757";
            
            let interval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('venomTimer').innerText = `00:${Math.max(0, timeLeft).toFixed(1).padStart(4, '0')}`;
                
                if(timeLeft <= 0) {
                    sendBackendToast("스킬 사용 타이밍!", "베놈 도우 쿠키의 맹독 중첩을 지금 폭발시키세요!");
                    clearInterval(interval);
                    document.getElementById('venomTimer').innerText = "00:12.5";
                    document.getElementById('venomTimer').style.color = "#2ed573";
                }
            }, 100);
        }
    </script>
</body>
</html>
