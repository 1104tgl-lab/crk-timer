<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRK PRO LIVE v13.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0F172A; --text-main: #FFFFFF; --text-sub: #94A3B8;     
            --c-cyan: #00E6F6; --c-purple: #9D4EDD; --c-pink: #EC4899;       
            --c-rose: #F43F5E; --c-sky: #0EA5E9; --c-orange: #F59E0B;     
            --c-green: #10B981; --c-mint: #2DD4BF; --bg-btn: rgba(15, 23, 42, 0.95);
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 상단바 */
        .sidebar-wrapper { width: 100%; height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .sidebar { width: 100%; height: 100%; display: flex; flex-direction: row; padding: 0 15px; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 900; color: var(--c-cyan); }
        .nav-btn { background: transparent; border: none; color: var(--text-sub); padding: 10px; font-size: 18px; cursor: pointer; border-radius: 8px; }
        .nav-btn.active { color: var(--text-main); background: rgba(255,255,255,0.1); }

        /* 메인 레이아웃 */
        .main-content { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view-section { display: none; width: 100%; max-width: 1600px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 카드 및 그리드 */
        .row { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; width: 100%; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 16px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .card.bright { background: rgba(71, 85, 105, 0.7); }
        .card-header { font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        
        .item-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
        .item { background: rgba(15, 23, 42, 0.8); border-radius: 14px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .item-click-area { padding: 18px 5px 12px 5px; cursor: pointer; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-btn-area { background: var(--bg-btn); padding: 8px; display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        
        .item-title { font-size: 11px; color: var(--text-sub); font-weight: bold; margin-bottom: 6px; text-align: center; }
        .item-val { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; text-align: center; }
        
        .text-cyan { color: var(--c-cyan); } .text-purple { color: var(--c-purple); } .text-pink { color: var(--c-pink); }
        .text-rose { color: var(--c-rose); } .text-sky { color: var(--c-sky); } .text-orange { color: var(--c-orange); }
        .text-mint { color: var(--c-mint); } .text-white { color: #FFF; } .text-gray { color: #64748B; }

        .task-btn-container { display: flex; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
        .task-btn-half { flex: 1; padding: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* 🔥 PC 모드 하이브리드 교정 🔥 */
        @media (min-width: 981px) {
            body { flex-direction: row; }
            .sidebar-wrapper { width: 75px; height: 100vh; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.05); }
            .sidebar { flex-direction: column; padding: 30px 10px; }
            .main-content { padding: 30px; }
            .row { flex-direction: row; align-items: stretch; } 
            .card { flex: 1; width: auto; } /* 채굴 카드 등 단독 카드 가로 확장 */
            .card-stam { flex: 1.2; } .card-track { flex: 1.8; } .card-exp { flex: 1; } .card-train { flex: 3; } .card-bal { flex: 1; }
        }

        dialog { margin: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; background: rgba(30,41,59,0.98); color: white; padding: 25px; width: 90%; max-width: 400px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .action-btn { background: var(--c-purple); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <input type="file" id="bgInput" accept="image/*" style="display: none;">
    <div class="sidebar-wrapper">
        <div class="sidebar">
            <div class="logo">💎</div>
            <div style="display:flex; flex-direction:inherit; gap:8px;">
                <button class="nav-btn active" onclick="switchView('dashboard', this)">📊</button>
                <button class="nav-btn" onclick="switchView('settings', this)">⚙️</button>
            </div>
            <button class="nav-btn" onclick="document.getElementById('bgInput').click()">🖼️</button>
        </div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="view-section active">
            <div class="row">
                <div class="card bright card-stam"><div class="card-header"><span class="dot" style="background:var(--c-cyan)"></span> 에너지</div><div class="item-grid" id="grid-stam"></div></div>
                <div class="card card-track"><div class="card-header"><span class="dot" style="background:var(--c-purple)"></span> 시스템</div><div class="item-grid" id="grid-track"></div></div>
            </div>
            <div class="row">
                <div class="card card-exp"><div class="card-header"><span class="dot" style="background:var(--c-rose)"></span> 탐사</div><div class="item-grid" id="grid-exp"></div></div>
                <div class="card bright card-train"><div class="card-header"><span class="dot" style="background:var(--c-pink)"></span> 열차 (자동정렬)</div><div class="item-grid" id="grid-train"></div></div>
                <div class="card card-bal"><div class="card-header"><span class="dot" style="background:var(--c-sky)"></span> 열기구</div><div class="item-grid" id="grid-bal"></div></div>
            </div>
            <div class="row"><div class="card"><div class="card-header"><span class="dot" style="background:var(--c-orange)"></span> 채굴 (자동정렬)</div><div class="item-grid" id="grid-mine"></div></div></div>
            <div class="row" id="row-tasks" style="display:none;"><div class="card bright"><div class="card-header"><span class="dot" style="background:var(--c-mint)"></span> 생산/업그레이드</div><div class="item-grid" id="grid-tasks"></div></div></div>
        </div>

        <div id="settings" class="view-section">
            <div class="card bright" style="max-width:450px; margin: 0 auto;">
                <div class="card-header">⚙️ 프로젝트 수동 등록</div>
                <div class="input-group"><label>작업명</label><input type="text" id="mName"></div>
                <div style="display:flex; gap:10px;"><input type="number" id="mD" value="0">일 <input type="number" id="mH" value="0">시 <input type="number" id="mM" value="0">분</div>
                <button class="action-btn" style="margin-top:15px;" onclick="addTask()">등록하기</button>
            </div>
            <div style="text-align:center; margin-top:50px;">
                <button style="background:transparent; border:none; color:#475569; font-size:11px; text-decoration:underline; cursor:pointer;" onclick="if(confirm('모든 서버 데이터를 초기화할까요?')){db.ref('crk_data').set(INITIAL_STATE); location.reload();}">클라우드 초기화</button>
            </div>
        </div>
    </div>

    <dialog id="setupModal"><h3 id="setupTitle" style="margin-bottom:15px;">설정</h3><div id="setupBody"></div><div style="margin-top:15px; display:flex; gap:10px;"><button class="action-btn" style="background:var(--c-cyan); color:#000; flex:2" onclick="applySetup()">확인</button><button id="btnReset" class="action-btn" style="background:var(--c-rose); flex:1" onclick="resetSetup()">리셋</button></div><button class="action-btn" style="background:#334155" onclick="document.getElementById('setupModal').close()">취소</button></dialog>
    <dialog id="accelModal"><h3 id="accelTitle" style="margin-bottom:15px;">가속</h3><div id="accelOptions" class="item-grid" style="grid-template-columns:1fr 1fr;"></div><button class="action-btn" onclick="applyAccel()">적용</button><button class="action-btn" style="background:#334155" onclick="document.getElementById('accelModal').close()">취소</button></dialog>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyC7JjMhgFb6qw_NloERkHIwil9id-UOcJI",
        authDomain: "my-crk-timer.firebaseapp.com",
        projectId: "my-crk-timer",
        storageBucket: "my-crk-timer.firebasestorage.app",
        messagingSenderId: "239900291854",
        appId: "1:239900291854:web:55880a710ae6e131dc1d5f",
        databaseURL: "https://my-crk-timer-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const INITIAL_STATE = { kp:false, bg:"", stam:{normal:{c:0, m:200, e:0}, thick:{c:0, m:140, e:0}, fate:{c:0, m:100, e:0}}, arena:0, fount:Math.floor(Date.now()/1000), prod:0, exp:0, bear_train:[0,0,0], bear_balloon:0, mining:[0,0,0,0,0,0], tasks:[] };
    let state = JSON.parse(JSON.stringify(INITIAL_STATE));
    let tAccel=null, tSetup=null, notified={};

    // 실시간 연동
    db.ref('crk_data').on('value', (snapshot) => {
        const val = snapshot.val();
        if(val) {
            state = Object.assign(state, val);
            if(state.bg) document.body.style.backgroundImage = `url('${state.bg}')`;
            render();
        } else { db.ref('crk_data').set(INITIAL_STATE); }
    });

    function save() { db.ref('crk_data').update(state); }
    function switchView(v, b) { document.querySelectorAll('.view-section').forEach(e => e.classList.remove('active')); document.getElementById(v).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active')); b.classList.add('active'); }
    function fmt(s) { if(s<=0) return "00:00:00"; let d=Math.floor(s/86400), h=Math.floor((s%86400)/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60); let t=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`; return d>0 ? `${d}d ${t}` : t; }
    
    // 🔥 알림 로직 정상화 (notify 단독 관리) 🔥
    function notify(id, m) {
        if(!notified[id]) {
            notified[id] = true;
            // 윈도우 파이썬 알림 호출
            if(window.qt && window.qt.webChannelTransport) {
                new QWebChannel(qt.webChannelTransport, function(channel) {
                    channel.objects.backend.show_toast("CRK 알림", m);
                });
            } else { console.log("Web 알림:", m); }
        }
    }

    // 제어 로직
    function clickTracking(t) { let n = Math.floor(Date.now()/1000); if(t==='arena'){ if(state.arena>n) state.arena=0; else {state.arena=n+(state.kp?600:1800); notified['arena']=false;} } else if(t==='fount') state.fount=n; else if(t==='prod') state.prod=(state.prod>0)?0:n; save(); }
    function openStamModal(k, t) { tSetup='stam_'+k; document.getElementById('setupTitle').innerText=t; document.getElementById('setupBody').innerHTML=`<div class="input-group"><label>현재 / 최대</label><div style="display:flex; gap:10px;"><input type="number" id="sC" value="${state.stam[k].c}"> / <input type="number" id="sM" value="${state.stam[k].m}"></div></div>`; document.getElementById('btnReset').style.display='none'; document.getElementById('setupModal').showModal(); }
    function openSetupModal(id, t) { tSetup=id; document.getElementById('setupTitle').innerText=t; document.getElementById('btnReset').style.display='block'; let h=`<div class="input-group"><label>시 : 분</label><div style="display:flex; gap:10px;"><input type="number" id="setH" value="0"> : <input type="number" id="setM" value="0"></div></div>`; if(id==='exp'||id.startsWith('m_')) h=`<div class="input-group"><label>프리셋</label><select id="setT"><option value="custom">직접입력</option><option value="8">8시간</option><option value="11.5">11.5시간</option><option value="24">24시간</option></select></div>`+h; document.getElementById('setupBody').innerHTML=h; document.getElementById('setupModal').showModal(); }
    function applySetup() { let n = Math.floor(Date.now()/1000); if(tSetup.startsWith('stam_')){ let k=tSetup.split('_')[1], c=parseInt(document.getElementById('sC').value)||0, m=parseInt(document.getElementById('sM').value)||1; let u=(k==='normal'&&state.kp)?240:(k==='normal'?300:(k==='thick'?600:900)); state.stam[k].c=c; state.stam[k].m=m; state.stam[k].e=(c<m)?n+(m-c)*u:0; } else { let sec=0; if(document.getElementById('setT') && document.getElementById('setT').value!=='custom') sec=parseFloat(document.getElementById('setT').value)*3600; else sec=(parseInt(document.getElementById('setH').value)||0)*3600+(parseInt(document.getElementById('setM').value)||0)*60; if(sec>0){ if(tSetup==='exp') {state.exp=n+sec; notified['exp']=false;} else if(tSetup.startsWith('tr_')) {state.bear_train[tSetup.split('_')[1]]=n+sec; notified['tr'+tSetup.split('_')[1]]=false;} else if(tSetup==='bal') {state.bear_balloon=n+sec; notified['bal']=false;} else if(tSetup.startsWith('m_')) {state.mining[tSetup.split('_')[1]]=n+sec; notified['m'+tSetup.split('_')[1]]=false;} else if(tSetup.startsWith('t_')) {state.tasks[tSetup.split('_')[1]].end=n+sec; notified['t'+tSetup.split('_')[1]]=false;} } } save(); document.getElementById('setupModal').close(); }
    function resetSetup() { if(tSetup==='exp') state.exp=0; else if(tSetup.startsWith('tr_')) state.bear_train[tSetup.split('_')[1]]=0; else if(tSetup==='bal') state.bear_balloon=0; else if(tSetup.startsWith('m_')) state.mining[tSetup.split('_')[1]]=0; save(); document.getElementById('setupModal').close(); }
    function openAccelModal(id, t) { if(event) event.stopPropagation(); tAccel=id; let opts=[["1m",60],["10m",600],["1h",3600],["12h",43200]]; let h=''; opts.forEach((o,i)=>h+=`<div class="input-group"><label>${o[0]}</label><input type="number" id="accel_${i}" value="0"></div>`); document.getElementById('accelOptions').innerHTML = h; document.getElementById('accelModal').showModal(); }
    function applyAccel() { let opts=[60,600,3600,43200], tot=0; opts.forEach((s,i)=>tot+=s*(parseInt(document.getElementById(`accel_${i}`).value)||0)); if(tot>0){ let n=Math.floor(Date.now()/1000); if(tAccel==='exp') state.exp=Math.max(n, state.exp-tot); else if(tAccel.startsWith('tr_')) state.bear_train[tAccel.split('_')[1]]=Math.max(n, state.bear_train[tAccel.split('_')[1]]-tot); else if(tAccel==='bal') state.bear_balloon=Math.max(n, state.bear_balloon-tot); else if(tAccel.startsWith('m_')) state.mining[tAccel.split('_')[1]]=Math.max(n, state.mining[tAccel.split('_')[1]]-tot); else if(tAccel.startsWith('t_')) state.tasks[tAccel.split('_')[1]].end=Math.max(n, state.tasks[tAccel.split('_')[1]].end-tot); save(); } document.getElementById('accelModal').close(); }
    function addTask() { let n=document.getElementById('mName').value, s=(parseInt(document.getElementById('mD').value)||0)*86400+(parseInt(document.getElementById('mH').value)||0)*3600+(parseInt(document.getElementById('mM').value)||0)*60; if(n && s>0){ if(!state.tasks) state.tasks=[]; state.tasks.push({name:n, end:Math.floor(Date.now()/1000)+s}); save(); document.getElementById('mName').value=''; switchView('dashboard', document.querySelectorAll('.nav-btn')[0]); } }
    
    function getSortedIdx(arr, now) { return arr.map((v, i) => i).sort((a, b) => { let eA=arr[a], eB=arr[b], sA=(eA>now)?1:(eA>0?2:3), sB=(eB>now)?1:(eB>0?2:3); return sA!==sB ? sA-sB : (sA===1?eA-eB:a-b); }); }
    function drawItem(title, end, id, theme, isT=false, idx=0) {
        let n=Math.floor(Date.now()/1000), run=end>n, isE=end>0 && end<=n;
        let vStr = run ? fmt(end-n) : (isE ? "END" : "READY"), vCls = isE ? "text-gray" : theme;
        let btn = isT ? `<div class="task-btn-container"><div class="task-btn-half" onclick="openAccelModal('${id}','${title}')">▶▶▶</div><div class="task-btn-half task-btn-delete" onclick="event.stopPropagation(); if(confirm('삭제?')){state.tasks.splice(${idx},1); save();}">✖</div></div>` : `<div class="item-btn-area" onclick="openAccelModal('${id}','${title}')">▶▶▶</div>`;
        return `<div class="item"><div class="item-click-area" onclick="openSetupModal('${isT?'t_'+idx:id}','${title}')"><div class="item-title">${title}</div><div class="item-val ${vCls}">${vStr}</div></div>${btn}</div>`;
    }

    function render() {
        const now = Math.floor(Date.now()/1000);
        
        // 알림 트리거
        if(state.arena>0 && state.arena<=now) notify('arena','아레나 갱신 완료!');
        if(state.exp>0 && state.exp<=now) notify('exp','광산 탐사 완료!');
        for(let i=0; i<3; i++) if(state.bear_train[i]>0 && state.bear_train[i]<=now) notify('tr'+i,'열차 복귀!');
        for(let i=0; i<6; i++) if(state.mining[i]>0 && state.mining[i]<=now) notify('m'+i,'채굴 완료!');

        let h_s = ''; ['normal','thick','fate'].forEach(k => {
            let d=state.stam[k], u=(k==='normal'&&state.kp)?240:(k==='normal'?300:(k==='thick'?600:900)), r=d.e-now;
            let n = k==='normal'?'기본':k==='thick'?'두툼':'운명';
            if(r>0) h_s += `<div class="item"><div class="item-click-area" onclick="openStamModal('${k}','${n}')"><div class="item-title">${n}</div><div class="item-val text-white">${d.m-Math.ceil(r/u)}<span style="font-size:11px; color:#64748B">/${d.m}</span></div><div class="text-cyan" style="font-size:10px;">${fmt(r)}</div></div></div>`;
            else h_s += `<div class="item"><div class="item-click-area" onclick="openStamModal('${k}','${n}')"><div class="item-title">${n}</div><div class="item-val text-cyan">MAX</div></div></div>`;
        });
        document.getElementById('grid-stam').innerHTML = h_s;
        document.getElementById('grid-track').innerHTML = `<div class="item"><div class="item-click-area" onclick="clickTracking('arena')"><div class="item-title">아레나</div><div class="item-val text-purple">${state.arena>now?fmt(state.arena-now):"READY"}</div></div></div><div class="item"><div class="item-click-area" onclick="clickTracking('fount')"><div class="item-title">분수</div><div class="item-val text-white">${fmt(now-state.fount)}</div></div></div><div class="item"><div class="item-click-area" onclick="clickTracking('prod')"><div class="item-title">생산</div><div class="item-val text-white">${state.prod>0?fmt(now-state.prod):"OFF"}</div></div></div>`;
        document.getElementById('grid-exp').innerHTML = drawItem("탐사", state.exp, "exp", "text-rose");
        let h_tr=''; getSortedIdx(state.bear_train, now).forEach(i=>h_tr+=drawItem("열차", state.bear_train[i], 'tr_'+i, "text-pink")); document.getElementById('grid-train').innerHTML=h_tr;
        document.getElementById('grid-bal').innerHTML = drawItem("열기구", state.bear_balloon, "bal", "text-sky");
        let h_m=''; getSortedIdx(state.mining, now).forEach(i=>h_m+=drawItem("채굴", state.mining[i], 'm_'+i, "text-orange")); document.getElementById('grid-mine').innerHTML=h_m;
        if(state.tasks && state.tasks.length>0){
            document.getElementById('row-tasks').style.display='flex';
            let sortedT = state.tasks.map((t,i)=>({...t, orig:i})).sort((a,b)=>{ let sA=(a.end>now)?1:(a.end>0?2:3), sB=(b.end>now)?1:(b.end>0?2:3); return sA!==sB?sA-sB:(sA===1?a.end-b.end:a.orig-b.orig); });
            let h_t=''; sortedT.forEach(t=>{ h_t+=drawItem(t.name, t.end, 't_'+t.orig, "text-mint", true, t.orig); if(t.end>0 && t.end<=now) notify('t'+t.orig, t.name+' 완료!'); });
            document.getElementById('grid-tasks').innerHTML=h_t;
        } else document.getElementById('row-tasks').style.display='none';
    }
    setInterval(render, 1000);
</script>
</body>
</html>
